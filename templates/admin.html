{% extends "base.html" %}

{% block content %}

<h2></h2>

<div class="left-panel">
    <h2>BIENVENIDO</h2>
    <h2>ADMINISTRADOR</h2>
    <p>
        logeate para continuar 
    </p>
</div>

<div class="right-panel">

    <h2>Login Administrador</h2>

    <form action="{{ url_for('admin.perfil_admin') }}" method="POST" class="card">

        <div class="input-box">
            <input type="text" name="username" placeholder="Username" required>
            <span>👤</span>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
            <span>🔒</span>
        </div>

        <button type="submit">Login</button>

    </form>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p style="color: #ff4444; margin-top: 10px; font-size: 0.9rem;">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

</div>  
{% endblock %}
